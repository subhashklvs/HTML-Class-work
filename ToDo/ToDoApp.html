<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
}

#root {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

#app {
    background-color: #ffffff;
    width: 350px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.todo-heading {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    color: #333;
    margin-bottom: 15px;
}

.input-container {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.input-container input {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

.input-container input:focus {
    border-color: #667eea;
}

.input-container button {
    padding: 8px 12px;
    border: none;
    background-color: #667eea;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.input-container button:hover {
    background-color: #5a67d8;
}

ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

li {
    background-color: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.actions {
    display: flex;
    gap: 5px;
}

.actions button {
    border: none;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

.done-btn {
    background-color: #38a169;
    color: white;
}

.edit-btn {
    background-color: #dd6b20;
    color: white;
}

.delete-btn {
    background-color: #e53e3e;
    color: white;
}

.actions button:hover {
    opacity: 0.8;
}
    </style>
</head>
<body>
    <div id="root">
        <div id="app">
            <h1>My Todo List</h1>
        </div>
    </div>
    
</body>
</html>
