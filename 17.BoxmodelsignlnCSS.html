<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Sign Up Form</title>
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
       }
       body{
        background-color: darkcyan;
        height: 100vh;
        margin: 10px;
        padding: 10px;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        text-align: center;
       }
       form{
        margin: 190px auto;
        border: 1px solid #dbdbdb;
        width: 500px;
        height: auto;
        padding: 10px;
       }
       h2{
        color: #000;
        text-decoration: underline;
        padding-bottom: 10px;
       }
       form label{
        font-size: 18px;
        font-weight: bold;
        color: antiquewhite;
       }
       .style,select{
        height: 30px;
        width: 60%;
        border: 1px solid #dbdbdb;
        border-radius: 5px;
        margin: 5px;
        margin-bottom: 10px;
       }
       button{
        width: 30%;
        padding: 6px;
        border: none;
        border-radius: 5px;
        background-color: blanchedalmond;
        color: black;
        margin-top: 10px;
        margin-bottom: 10px;
       }
       
    </style>
</head>
<body>
    <form>
        <h2>Sign Up Form</h2>
        <div>
        <label>UserName:</label><br><br>
        <input type="text" class="style" placeholder="Enter Your Name"/>
        </div>
        <div>
            <label>Email:</label><br><br>
            <input type="email" class="style" placeholder="Enter Email"/>
        </div>
        <div>
            <label>Password:</label><br><br>
            <input type="password" class="style" placeholder="Enter Password"/>
        </div>
        <div>
            <label>Gender:</label>
            <input type="radio" name="gender"/>Male 
            <input type="radio" name="gender"/> Female
        </div>
        <div>
            <label>+91</label>
            <select>
                <option class="option">Australia</option>
                <option>India</option>
                <option>Canada</option>
            </select>
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
