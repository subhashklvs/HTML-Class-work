<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-index</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: darkcyan;
            height: 100vh;
            margin: 10px;
            padding: 10px;
        }
        .box1{
            background-color: brown;
            border-radius: 5px;
            height: 200px;
            width: 200px;
            position: absolute;
            left: 50px;
            top: 50px;
            z-index: 3;
        }
        .box2{
            background-color: blue;
            border-radius: 5px;
            height: 200px;
            width: 200px;
            position: absolute;
            left: 100px;
            top: 100px;
            z-index: 2;
        }
        .box3{
            background-color: yellow;
            border-radius: 5px;
            height: 200px;
            width: 200px;
            position: absolute;
            left: 150px;
            top: 150px;
            z-index: 3;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
