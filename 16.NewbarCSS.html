<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVBAR</title>
    <style>
        body{
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightcyan;
        }
        nav{
            background-color: black;
            padding-left:5px;
            
        }
        h2{
            color: white;
            margin-left:20px;
            display: inline-block;
        }
        ul{
            
            display: inline-block;
            float: right;
            line-height: 2.5;
            
            
        }
        li{
            list-style-type: none;
            display: inline-block;
            margin-left: 10px;
            margin-right: 10px;
        }
        a{
            text-decoration: none;
            color: white;
        }
        .
    </style>
</head>
<body>
    <NAV>
        <h2 class="logo">shopy</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>

        </ul>
    </NAV>
    
</body>
</html>
