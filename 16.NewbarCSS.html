<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAVBAR</title>
<style>
    body {
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background-color: lightcyan;
        margin: 0;
    }
    nav {
        background-color: black;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
    }
    h2.logo {
        color: white;
        margin: 0;
    }
    ul {
        list-style-type: none;
        display: flex;
        margin: 0;
        padding: 0;
    }
    li {
        margin-left: 15px;
    }
    a {
        text-decoration: none;
        color: white;
        font-size: 16px;
    }
</style>
</head>
<body>
    <nav>
        <h2 class="logo">shopy</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</body>
</html>
