<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>medaQueries</title>
    <style>
        body{

        }

        p{
            font-size: 15px;
            color: cornflowerblue;
        }
        h3{
            color: brown;

        }
        @media(max-width:576px){

            }

            }
