<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Elements</title>
    <style>
        body{
            background-color: cadetblue;
            color: white;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            text-align: center;
            height: 100vh;
        }
        h1{
            font-size: 50px;
            line-height: 2.5;
        }
        h1::first-letter{
            font-size: 40px;
            color:red;
            font-style: italic;
            font-family: Arial, Helvetica, sans-serif;
        }
        p::before{
            content:"Description ";
            color:blueviolet;
        }
        p::after{
            content:"😏";
            font-size:30px;
        }
        p{
            font-size: 20px;
            font-weight: bold;
        }
        p::first-line{
            font-size:25px;
            font-style:italic;
            color:darkblue;
            font-family:cursive;
        }
        button{
            width: 10%;
            color:brown;
            font-weight: bold;
        }
        button:hover{
            background-color:darkblue;
            color: white;
            height:5%;
        }
        a:link{
            color:purple;
            font-size:20px;
            font-weight:bold;
            line-height:2.2;
        }
        a:active{
            color:aqua;
        }
        a:visited{
            color:chocolate
        }
    </style>
</head>
<body>
    <h1>Welcome To Team India World Cup</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. <br>
        Odio amet sequi atque, eveniet similique temporibus obcaecati <br>
        maiores voluptate! Voluptatibus expedita quod error rem quidem <br>
        tempora perferendis voluptate ducimus, debitis repellendus.</p>
        <button>Get Started</button><br>
        <a href="https://www.amazon.com">Go To Amazon Website</a>
</body>
</html>
