<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storages in JS: localStorage &amp; sessionStorage</title>
</head>
<body>
    <h1>Storages In JS Local &amp; Session</h1>
    <p>Open browser console (F12) to see logs.</p>
    <script>
        // LocalStorage example
        let data = 'Dhathri sri lekha';
        localStorage.setItem("username", data);
        console.log("localStorage username:", localStorage.getItem("username"));
        // localStorage.removeItem("username"); // Uncomment to remove

        // SessionStorage example - Object
        let data_2 = {
            employee_company_name: "ABC Corp",
            salary: "12LPA"
        };
        sessionStorage.setItem("obj", JSON.stringify(data_2));
        console.log("sessionStorage obj:", JSON.parse(sessionStorage.getItem("obj")));

        // Clean up
        // sessionStorage.removeItem("obj"); // Uncomment to remove
        // sessionStorage.clear(); // Clear all sessionStorage
    </script>
</body>
</html>
