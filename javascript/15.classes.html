<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classess</title>
    <style>
        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items: center;
            background-color: black;
            color: white;

        }
        .main-heading{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size:30px;
            font-weight:bold;
            color:crimson;
        }
    </style>
</head>
<body>
    <h1 id="text">unlimited Movies shows & More</h1>
    <h4>Starts at Rs149,Claim Now</h4>
    <p>Plan To Subscribe Your Netflix Plan.</p>
    <button>Get Started</button>
    <script>
        let text=document.getElementById("text");
        text.className="main-heading";

        let desc=document.getElementById("desc");
        desc.classList.add("main-heading");
        //desc.classList.remove("main-heading");
    </script>
    
</body>
</html>
